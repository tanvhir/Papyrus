name: Build Papyrus App
on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build Project
        run: npm run build

      - name: Create main.js for Electron
        shell: bash
        run: |
          cat <<EOF > main.js
          const { app, BrowserWindow } = require('electron');
          const path = require('path');
          const { fileURLToPath } = require('url');

          function createWindow() {
            const win = new BrowserWindow({
              width: 1200,
              height: 800,
              webPreferences: { nodeIntegration: true }
            });
            win.loadFile(path.join(__dirname, 'dist/index.html'));
          }
          app.whenReady().then(createWindow);
          app.on('window-all-closed', () => { if (process.platform !== 'darwin') app.quit(); });
          EOF

      - name: Setup Electron and Forge
        # এখানে --yes অপশনটি সরিয়ে দেওয়া হয়েছে যা সমস্যার মেইন কারণ ছিল
        run: |
          npm install --save-dev electron @electron-forge/cli @electron-forge/maker-squirrel
          npx electron-forge import

      - name: Make EXE
        run: npm run make

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: Papyrus-Desktop-App
          path: out/make/squirrel.windows/x64/*.exe
