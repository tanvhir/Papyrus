name: Build Papyrus App
on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build Web Project
        run: npm run build

      - name: Create Electron Files
        shell: bash
        run: |
          # main.js তৈরি (ESM format)
          cat <<EOF > main.js
          import { app, BrowserWindow } from 'electron';
          import path from 'path';
          import { fileURLToPath } from 'url';
          import squirrelStartup from 'electron-squirrel-startup';

          if (squirrelStartup) app.quit();

          const __dirname = path.dirname(fileURLToPath(import.meta.url));

          function createWindow() {
            const win = new BrowserWindow({
              width: 1200,
              height: 800,
              icon: path.join(__dirname, 'icon.ico'),
              webPreferences: { 
                nodeIntegration: false, 
                contextIsolation: true 
              }
            });
            win.loadFile(path.join(__dirname, 'dist/index.html'));
          }

          app.whenReady().then(createWindow);
          app.on('window-all-closed', () => { if (process.platform !== 'darwin') app.quit(); });
          EOF

          # forge.config.cjs তৈরি
          cat <<EOF > forge.config.cjs
          const path = require('path');
          module.exports = {
            packagerConfig: { 
              asar: true,
              icon: path.resolve(__dirname, 'icon')
            },
            makers: [
              {
                name: '@electron-forge/maker-squirrel',
                config: { 
                  name: 'Papyrus',
                  setupIcon: path.resolve(__dirname, 'icon.ico'),
                  authors: 'Tanvir (mailtanvir26@gmail.com)',
                  description: 'almost anything could be possible'
                },
              }
            ],
          };
          EOF

      - name: Install Forge CLI
        # এখান থেকে startup লাইব্রেরি সরানো হয়েছে কারণ এটি package.json এ আছে
        run: npm install --save-dev @electron-forge/cli @electron-forge/maker-squirrel

      - name: Make EXE
        run: |
          npm pkg set main="main.js"
          npx electron-forge make --config forge.config.cjs

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: Papyrus-Desktop-App
          path: out/make/squirrel.windows/**/*.exe
