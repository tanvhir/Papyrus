name: Build Papyrus App
on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build Web Project
        run: npm run build

      - name: Create Electron Files
        shell: bash
        run: |
          # main.js তৈরি (আপনার package.json-এর "type": "module" এর সাথে মিল রেখে)
          cat <<EOF > main.js
          import { app, BrowserWindow } from 'electron';
          import path from 'path';
          import { fileURLToPath } from 'url';

          const __dirname = path.dirname(fileURLToPath(import.meta.url));

          function createWindow() {
            const win = new BrowserWindow({
              width: 1200,
              height: 800,
              icon: path.join(__dirname, 'icon.ico'), // এখানে আইকন সেট করা হয়েছে
              webPreferences: { nodeIntegration: false, contextIsolation: true }
            });
            win.loadFile(path.join(__dirname, 'dist/index.html'));
          }

          app.whenReady().then(createWindow);
          app.on('window-all-closed', () => { if (process.platform !== 'darwin') app.quit(); });
          EOF

          # forge.config.cjs তৈরি (বিল্ডের জন্য প্রয়োজনীয় সব কনফিগ এখানে)
          cat <<EOF > forge.config.cjs
          module.exports = {
            packagerConfig: { 
              asar: true,
              icon: './icon' // এখানে আইকনের পাথ (এক্সটেনশন ছাড়া দিতে হয়)
            },
            makers: [
              {
                name: '@electron-forge/maker-squirrel',
                config: { 
                  name: 'Papyrus',
                  setupIcon: './icon.ico', // ইন্সটলারের আইকন
                  authors: 'Tanvir (mailtanvir26@gmail.com)',
                  description: 'almost anything could be possible'
                },
              }
            ],
          };
          EOF

      - name: Install Electron Forge
        run: npm install --save-dev @electron-forge/cli @electron-forge/maker-squirrel

      - name: Make EXE
        run: |
          # বিল্ডের সময় package.json এ প্রয়োজনীয় তথ্য সেট করা
          npm pkg set author="Tanvir (mailtanvir26@gmail.com)"
          npm pkg set description="almost anything could be possible"
          npm pkg set main="main.js"
          # বিল্ড শুরু
          npx electron-forge make --config forge.config.cjs

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: Papyrus-Desktop-App
          path: out/make/squirrel.windows/**/*.exe
